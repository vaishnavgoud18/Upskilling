<!DOCTYPE html>
<html lang="en">
<head>
<title>CSS Box Model</title>
<style>
    .box1{
background-color: #ff776a;
border: 3px solid black;
}
.heading1{
padding: 1rem;
font-size: 24px;
}
.box2{
background-color: paleturquoise;
border: 8px solid darkblue;
margin-top: 1rem;
}
p{
padding-left: 1rem;
}
.para3{
background-color: paleturquoise;
border: 8px solid darkblue;
margin-top: 1rem;
}
.yellow-bg{
background-color: yellow;
color: red;
}
li{
color: magenta;
}
.box3{
background-color: paleturquoise;
border: 8px solid darkblue;
}
#white-bg{
background-color: white;
display: inline-block;
}
.white-bg{
background-color: white;
padding: 1rem 4px;
border:4px solid black;
}


</style>
</head>
<body>
<div class="box1">
<h1 class="heading1">Box Model</h1>
</div>
<div class="box2">
<p class="para2">Every element on the page has its own box, which can be styled using CSS.</p>
</div>
<div class="box3">
<p class="para2">From the inside out: </p>
</div>
<ul>
<li class="yellow-bg">content</li>
<li>padding</li>
<li class="yellow-bg">border</li>
<li>margin</li>
</ul>
<h2>Background</h2>
<div class="para3-div">
<p class="para3">Keep in mind that a <span class="white-bg">background</span> will cover the content ans the padding.</p>
</div>
</body>
</html>
