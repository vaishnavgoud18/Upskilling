<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var arr=[3,'a','b','a','a','a','c'];
        var len=arr.length;
        var completed=[]
        var mostFreq;
        var maxcount=0;
        for(let i=0;i<len;i++){
            let count=0;
            if (!(completed.includes(arr[i]))){
                for (let j=i; j<len;j++){
                    if (arr[i]===arr[j]){
                        count+=1;
                    }
               
                if (count>maxcount){
                        maxcount=count;
                        mostFreq=arr[i]
                    }

                }
                completed.push(arr[i]);

            }
            
            

        }
        document.write(mostFreq +" : "+maxcount +" times");

    </script>
    
</body>
</html>
