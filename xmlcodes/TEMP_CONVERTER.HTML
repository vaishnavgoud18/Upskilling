<!DOCTYPE html>
<html>
<head>
 <title>Temperature Converter</title>
</head>
<body>
<h2>Fahrenheit to Celsius Converter</h2>
<input type="number" id="fahrenheit" placeholder="Enter Fahrenheit">
<button onclick="convert()">Convert</button>
<p id="result"></p>
<script>
 function convert() {
 let f = document.getElementById("fahrenheit").value;
 let c = (f - 32) * 5 / 9;
 document.getElementById("result").innerHTML =
 "Temperature in Celsius: " + c.toFixed(2) + " °C";
 alert("temp is "+c);
 console.log( "temp is " +c);
 }
</script>
</body>
</html>
