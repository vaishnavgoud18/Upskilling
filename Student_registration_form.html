<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
</head>
<style>
    .cont1{
        background-color: orange;
        height:100vh;
        padding:15px;
        padding-left:20px;

    }
    .heading{
        font-size:28px;
        font-family:"Roboto";
    }
</style>
<body>
    <div class="cont1">
        <h1 class="heading">Student Registration Form</h1>
        <p>Fill in this from to register</p>
        <label for ="firstname" >First Name : </label>
        <input type="text" name="firstname">
        <br>
        <br>
        <label for ="lastname" >Last name : </label>
        <input type="text" name="last Name">
        <br>
        <br>
        <label for ="email" >E-mail : </label>
        <input type="email" name="email">
        <br>
        <br>
        <label for="Date">Date of Birth: </label>
        <input type="date" name="Date">
         <br>
        <br>
        <label for ="user-name" >Set Username : </label>
        <input type="text" name="user-name">
        <br>
        <br>
        <label for ="password" >Password : </label>
        <input type="password" name="password">
        <br>
        
        <h1 style="font-size:18px;">Gender :</h1>
        <input type="radio" name="radiobutton" value="1">Male<br>
        <input type="radio" name="radiobutton" value="1">Female<br>
        <input type="radio" name="radiobutton" value="1">Others<br>
        <br>
        <label for="course">Course : </label>
        <select name="course">
            <option value="0">Course</option>
            <option value="1">CSE</option>
            <option value="2">IT</option>
            <option value="3">ECE</option>
        </select>
        <br>
        <br>
        <button>Register</button>
    </div>
    
</body>
</html>
